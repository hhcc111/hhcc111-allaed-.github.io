<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数援青春 - 应急救护公益推广平台</title>
  <!-- 第三方依赖 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/fullpage.js/4.0.20/fullpage.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/animate.css/4.1.1/animate.min.css">
  <!-- 自定义样式（紧密关联） -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="fullpage">
    <!-- 屏1：首屏海报 -->
    <div class="section section-1">
      <div class="container">
        <div class="hero-box" data-animate="fadeInDown">
          <h1 class="hero-title">数援青春</h1>
          <p class="hero-subtitle">用专业急救知识，守护每一个生命</p>
          <button class="primary-btn">立即咨询培训</button>
        </div>
      </div>
    </div>

    <!-- 屏2：核心服务 -->
    <div class="section section-2">
      <div class="container">
        <div class="service-box" data-animate="fadeInLeft">
          <h2 class="section-title">核心服务传播</h2>
          <div class="service-card">
            <img src="images/aed.png" alt="AED设备">
            <h3>AED设备普及与布设</h3>
            <p>校园/社区/公共场所标准化点位部署</p>
          </div>
          <div class="service-card">
            <img src="images/train.png" alt="急救培训">
            <h3>应急救护实战培训</h3>
            <p>CPR+AED专业认证，全员覆盖</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 屏3：急救知识 -->
    <div class="section section-3">
      <div class="container">
        <div class="knowledge-box" data-animate="fadeInRight">
          <h2 class="section-title">应急知识科普</h2>
          <div class="know-item">心肺复苏CPR标准流程</div>
          <div class="know-item">AED使用一键操作指南</div>
          <div class="know-item">突发意外应急处理方法</div>
        </div>
      </div>
    </div>

    <!-- 屏4：项目实力 -->
    <div class="section section-4">
      <div class="container">
        <div class="data-box" data-animate="zoomIn">
          <h2 class="section-title">公益成果展示</h2>
          <div class="data-item"><span>5000+</span>培训人员</div>
          <div class="data-item"><span>200+</span>AED点位</div>
          <div class="data-item"><span>100+</span>合作单位</div>
        </div>
      </div>
    </div>

    <!-- 屏5：报名表单 -->
    <div class="section section-5">
      <div class="container">
        <div class="form-box" data-animate="fadeInUp">
          <h2 class="section-title">免费领取急救资料</h2>
          <form class="apply-form">
            <input type="text" placeholder="请输入姓名" required>
            <input type="tel" placeholder="请输入手机号" required>
            <button type="submit" class="submit-btn">立即提交</button>
          </form>
        </div>
      </div>
    </div>

    <!-- 屏6：底部 -->
    <div class="section section-6">
      <div class="container footer-box">
        <p>数援青春应急救护公益项目</p>
        <p>联系电话：138XXXX8888</p>
        <p>© 2025 版权所有</p>
      </div>
    </div>
  </div>

  <!-- 第三方JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/fullpage.js/4.0.20/fullpage.min.js"></script>
  <!-- 自定义交互（紧密关联） -->
  <script src="js/main.js"></script>
</body>
</html>
